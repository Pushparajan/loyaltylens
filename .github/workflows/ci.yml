name: LoyaltyLens CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read        # checkout
  pull-requests: write  # post PR comments (drift-check)

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff
        run: uv run ruff check .

  type-check:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Run mypy
        run: uv run mypy .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: type-check

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: loyaltylens
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: loyaltylens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U loyaltylens"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      weaviate:
        image: semitechnologies/weaviate:1.25.4
        env:
          AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
          PERSISTENCE_DATA_PATH: /var/lib/weaviate
          DEFAULT_VECTORIZER_MODULE: none
        ports:
          - 8080:8080

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://loyaltylens:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/loyaltylens
      REDIS_URL: redis://localhost:6379
      WEAVIATE_URL: http://localhost:8080
      INTEGRATION: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Run pytest
        run: uv run pytest --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  eval-gate:
    name: Eval Gate (score ≥ 0.75)
    runs-on: ubuntu-latest
    needs: test

    env:
      EVAL_PASS_THRESHOLD: "0.75"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Run eval harness
        run: uv run python llmops/eval_harness/run_eval.py --threshold 0.75

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: llmops/eval_results/

  drift-check:
    name: Drift Check (PSI)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Run drift monitor
        run: uv run python llmops/drift_monitor/run_drift.py --output drift_report.json

      - name: Post PSI as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            try {
              const report = JSON.parse(fs.readFileSync('drift_report.json', 'utf8'));
              const emoji = report.status === 'ok' ? '✅' : report.status === 'warning' ? '⚠️' : '🚨';
              const body = `${emoji} **Propensity Drift Monitor**\n\nPSI \`${report.psi}\` — **${report.status.toUpperCase()}**\n\n| Metric | Value |\n|--------|-------|\n| Baseline date | ${report.baseline_date} |\n| Current date | ${report.current_date} |\n| N baseline | ${report.n_baseline} |\n| N current | ${report.n_current} |\n\n_Warning threshold: ${report.thresholds?.warning ?? 0.10}, Critical: ${report.thresholds?.critical ?? 0.20}_`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } catch (e) {
              console.log('Could not post drift comment:', e.message);
            }

  deploy-gate:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [eval-gate, drift-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Deploy to staging
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: uv run python shared/deploy.py --env staging
